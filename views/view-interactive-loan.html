<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loan Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: #0d1117; 
    color: #c9d1d9; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  .header {
    padding: 12px 16px;
    border-bottom: 1px solid #21262d;
    background: #161b22;
    flex-shrink: 0;
  }
  .header h1 {
    color: #58a6ff;
    font-size: 16px;
  }
  .header p {
    color: #8b949e;
    font-size: 12px;
    margin-top: 4px;
  }
  
  .content {
    flex: 1;
    display: flex;
    gap: 20px;
    padding: 20px;
    overflow: auto;
  }
  
  .controls {
    flex: 1;
    max-width: 400px;
  }
  
  .slider-group {
    margin-bottom: 20px;
  }
  .slider-group label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .slider-group .name { color: #c9d1d9; }
  .slider-group .value { color: #58a6ff; font-weight: bold; }
  
  input[type="range"] {
    width: 100%;
    height: 6px;
    background: #21262d;
    border-radius: 3px;
    outline: none;
    -webkit-appearance: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #58a6ff;
    border-radius: 50%;
    cursor: pointer;
  }
  
  .results {
    flex: 1;
    background: #161b22;
    border-radius: 8px;
    padding: 20px;
  }
  
  .result-main {
    text-align: center;
    padding: 30px;
    background: #0d1117;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .result-main .label {
    color: #8b949e;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .result-main .amount {
    font-size: 48px;
    font-weight: bold;
    color: #3fb950;
  }
  .result-main .per {
    color: #8b949e;
    font-size: 14px;
  }
  
  .breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .breakdown-item {
    background: #0d1117;
    padding: 14px;
    border-radius: 6px;
  }
  .breakdown-item .label {
    color: #8b949e;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .breakdown-item .value {
    font-size: 18px;
    font-weight: bold;
    color: #c9d1d9;
  }
  .breakdown-item.total .value { color: #f0883e; }
  .breakdown-item.interest .value { color: #f85149; }
  
  .chart {
    margin-top: 20px;
    height: 150px;
    display: flex;
    align-items: flex-end;
    gap: 4px;
  }
  .bar {
    flex: 1;
    background: #30363d;
    border-radius: 2px 2px 0 0;
    min-height: 4px;
    transition: height 0.2s;
  }
  .bar.principal { background: #58a6ff; }
  .bar.interest { background: #f85149; }
  
  .chart-legend {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 11px;
  }
  .chart-legend span { display: flex; align-items: center; gap: 6px; }
  .chart-legend .dot { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1>Loan Calculator</h1>
  <p>Drag sliders to see how payments change</p>
</div>

<div class="content">
  <div class="controls">
    <div class="slider-group">
      <label>
        <span class="name">Loan Amount</span>
        <span class="value" id="amount-display">$250,000</span>
      </label>
      <input type="range" id="amount" min="50000" max="1000000" value="250000" step="10000">
    </div>
    
    <div class="slider-group">
      <label>
        <span class="name">Interest Rate</span>
        <span class="value" id="rate-display">6.5%</span>
      </label>
      <input type="range" id="rate" min="1" max="15" value="6.5" step="0.1">
    </div>
    
    <div class="slider-group">
      <label>
        <span class="name">Loan Term</span>
        <span class="value" id="term-display">30 years</span>
      </label>
      <input type="range" id="term" min="5" max="30" value="30" step="1">
    </div>
    
    <div class="slider-group">
      <label>
        <span class="name">Down Payment</span>
        <span class="value" id="down-display">20%</span>
      </label>
      <input type="range" id="down" min="0" max="50" value="20" step="1">
    </div>
  </div>
  
  <div class="results">
    <div class="result-main">
      <div class="label">Monthly Payment</div>
      <div class="amount" id="monthly">$1,264</div>
      <div class="per">per month</div>
    </div>
    
    <div class="breakdown">
      <div class="breakdown-item">
        <div class="label">Principal</div>
        <div class="value" id="principal">$200,000</div>
      </div>
      <div class="breakdown-item">
        <div class="label">Total Interest</div>
        <div class="value interest" id="total-interest">$255,040</div>
      </div>
      <div class="breakdown-item total">
        <div class="label">Total Cost</div>
        <div class="value" id="total-cost">$455,040</div>
      </div>
      <div class="breakdown-item">
        <div class="label">Interest Ratio</div>
        <div class="value" id="ratio">56%</div>
      </div>
    </div>
    
    <div class="chart">
      <div class="bar principal" id="bar-principal"></div>
      <div class="bar interest" id="bar-interest"></div>
    </div>
    <div class="chart-legend">
      <span><div class="dot" style="background:#58a6ff"></div> Principal</span>
      <span><div class="dot" style="background:#f85149"></div> Interest</span>
    </div>
  </div>
</div>

<script>
const amountSlider = document.getElementById('amount');
const rateSlider = document.getElementById('rate');
const termSlider = document.getElementById('term');
const downSlider = document.getElementById('down');

function calculate() {
  const principal = parseInt(amountSlider.value);
  const rate = parseFloat(rateSlider.value) / 100;
  const years = parseInt(termSlider.value);
  const downPercent = parseInt(downSlider.value);
  
  const downPayment = principal * (downPercent / 100);
  const loanAmount = principal - downPayment;
  const monthlyRate = rate / 12;
  const numPayments = years * 12;
  
  let monthly;
  if (rate === 0) {
    monthly = loanAmount / numPayments;
  } else {
    monthly = loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / 
              (Math.pow(1 + monthlyRate, numPayments) - 1);
  }
  
  const totalCost = monthly * numPayments;
  const totalInterest = totalCost - loanAmount;
  const totalWithDown = totalCost + downPayment;
  
  // Update displays
  document.getElementById('amount-display').textContent = '$' + principal.toLocaleString();
  document.getElementById('rate-display').textContent = rate.toFixed(1) + '%';
  document.getElementById('term-display').textContent = years + ' years';
  document.getElementById('down-display').textContent = downPercent + '%';
  
  document.getElementById('monthly').textContent = '$' + Math.round(monthly).toLocaleString();
  document.getElementById('principal').textContent = '$' + Math.round(loanAmount).toLocaleString();
  document.getElementById('total-interest').textContent = '$' + Math.round(totalInterest).toLocaleString();
  document.getElementById('total-cost').textContent = '$' + Math.round(totalWithDown).toLocaleString();
  document.getElementById('ratio').textContent = Math.round((totalInterest / totalWithDown) * 100) + '%';
  
  // Update chart
  const maxHeight = 120;
  const principalHeight = (loanAmount / totalWithDown) * maxHeight;
  const interestHeight = (totalInterest / totalWithDown) * maxHeight;
  
  document.getElementById('bar-principal').style.height = principalHeight + 'px';
  document.getElementById('bar-interest').style.height = interestHeight + 'px';
}

amountSlider.addEventListener('input', calculate);
rateSlider.addEventListener('input', calculate);
termSlider.addEventListener('input', calculate);
downSlider.addEventListener('input', calculate);

calculate();
</script>
</body>
</html>
