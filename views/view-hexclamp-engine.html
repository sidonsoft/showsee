<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #0d1117; 
    min-height: 100vh; 
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    color: #c9d1d9;
    padding: 30px;
    font-size: 13px;
  }
  h1 { 
    color: #58a6ff; 
    font-size: 20px; 
    margin-bottom: 30px; 
    font-weight: 400;
    letter-spacing: 1px;
  }
  
  /* Pipeline */
  .pipeline {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 40px;
  }
  .stage {
    width: 80px;
    height: 50px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 1px;
    position: relative;
    opacity: 0.3;
    transition: opacity 0.3s, transform 0.3s;
  }
  .stage.active {
    opacity: 1;
    transform: scale(1.1);
  }
  .stage.done {
    opacity: 0.7;
  }
  .observe { background: #1e3a5f; color: #58a6ff; border: 2px solid #58a6ff; }
  .condense { background: #3d2914; color: #f0883e; border: 2px solid #f0883e; }
  .plan { background: #2d1f3d; color: #bc8cff; border: 2px solid #bc8cff; }
  .execute { background: #1a3d1a; color: #3fb950; border: 2px solid #3fb950; }
  .verify { background: #3d1a2d; color: #f778ba; border: 2px solid #f778ba; }
  .persist { background: #3d3d1a; color: #d29922; border: 2px solid #d29922; }
  
  .arrow {
    color: #484f58;
    font-size: 16px;
    padding: 0 8px;
  }
  
  /* State Files */
  .state-panel {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 30px;
  }
  .state-file {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    font-size: 11px;
  }
  .state-file h3 {
    color: #8b949e;
    font-size: 10px;
    margin-bottom: 8px;
    font-weight: 400;
  }
  .state-file .content {
    background: #0d1117;
    border-radius: 4px;
    padding: 8px;
    min-height: 60px;
    color: #c9d1d9;
    font-size: 10px;
    line-height: 1.5;
  }
  .state-file.active .content {
    border: 1px solid #58a6ff;
    background: #0d1117;
  }
  .state-file .badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 9px;
    margin-left: 5px;
  }
  .badge.open { background: #1f3d1f; color: #3fb950; }
  .badge.pending { background: #1f3a5f; color: #58a6ff; }
  .badge.done { background: #3d3d1a; color: #d29922; }
  .badge.failed { background: #3d1a1a; color: #f85149; }
  
  /* Log */
  .log {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 15px;
    height: 200px;
    overflow-y: auto;
  }
  .log h3 {
    color: #8b949e;
    font-size: 10px;
    margin-bottom: 10px;
    font-weight: 400;
  }
  .log-entry {
    font-size: 11px;
    padding: 3px 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .log-entry.visible { opacity: 1; }
  .log-entry .time { color: #484f58; margin-right: 8px; }
  .log-entry.observe { color: #58a6ff; }
  .log-entry.condense { color: #f0883e; }
  .log-entry.plan { color: #bc8cff; }
  .log-entry.execute { color: #3fb950; }
  .log-entry.verify { color: #f778ba; }
  .log-entry.persist { color: #d29922; }
  .log-entry.success { color: #3fb950; }
  .log-entry.error { color: #f85149; }
  .log-entry.task { color: #c9d1d9; }
  
  /* Controls */
  .controls {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
  }
  button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  button:hover { background: #30363d; }
  button.primary { background: #1f3d1f; border-color: #3fb950; color: #3fb950; }
  button.danger { background: #3d1a1a; border-color: #f85149; color: #f85149; }
  
  /* Cursor blink */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #58a6ff;
    animation: blink 1s infinite;
    vertical-align: middle;
    margin-left: 2px;
  }
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
  
  /* Highlight pulse */
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(88, 166, 255, 0); }
    100% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0); }
  }
  .stage.active { animation: pulse 1.5s infinite; }
</style>
</head>
<body>
  <h1>HEXCLAMP ENGINE</h1>
  
  <div class="controls">
    <button class="primary" onclick="runEnqueue()">Enqueue Task</button>
    <button class="primary" onclick="runLoop()">Run Cycle</button>
    <button class="danger" onclick="runFail()">Simulate Failure</button>
    <button onclick="reset()">Reset</button>
  </div>
  
  <!-- Pipeline -->
  <div class="pipeline">
    <div class="stage observe" id="s-observe">OBSERVE</div>
    <div class="arrow">-></div>
    <div class="stage condense" id="s-condense">CONDENSE</div>
    <div class="arrow">-></div>
    <div class="stage plan" id="s-plan">PLAN</div>
    <div class="arrow">-></div>
    <div class="stage execute" id="s-execute">EXECUTE</div>
    <div class="arrow">-></div>
    <div class="stage verify" id="s-verify">VERIFY</div>
    <div class="arrow">-></div>
    <div class="stage persist" id="s-persist">PERSIST</div>
  </div>
  
  <!-- State Files -->
  <div class="state-panel">
    <div class="state-file" id="sf-events">
      <h3>event_queue.json <span class="badge pending" id="ev-badge">0 events</span></h3>
      <div class="content" id="ev-content">[]</div>
    </div>
    <div class="state-file" id="sf-loops">
      <h3>open_loops.json <span class="badge open" id="loop-badge">0 loops</span></h3>
      <div class="content" id="loop-content">[]</div>
    </div>
    <div class="state-file" id="sf-state">
      <h3>current_state.json</h3>
      <div class="content" id="state-content">{ goal: "...", loops: [] }</div>
    </div>
  </div>
  
  <!-- Log -->
  <div class="log">
    <h3>Activity Log</h3>
    <div id="log-content"></div>
  </div>

<script>
let logEntries = [];
let taskId = 1;
let loopId = 1;
let events = [];
let loops = [];

function log(msg, type = 'task') {
  const time = new Date().toLocaleTimeString('en-US', { hour12: false });
  logEntries.push(`<div class="log-entry ${type} visible"><span class="time">[${time}]</span>${msg}</div>`);
  document.getElementById('log-content').innerHTML = logEntries.join('');
  document.getElementById('log-content').scrollTop = document.getElementById('log-content').scrollHeight;
}

function setStage(id, state) {
  ['observe', 'condense', 'plan', 'execute', 'verify', 'persist'].forEach(s => {
    document.getElementById('s-' + s).className = 'stage ' + s;
  });
  if (state === 'active') document.getElementById('s-' + id).className = 'stage ' + id + ' active';
  if (state === 'done') document.getElementById('s-' + id).className = 'stage ' + id + ' done';
}

function updateState() {
  document.getElementById('ev-content').textContent = JSON.stringify(events, null, 2);
  document.getElementById('ev-badge').textContent = events.length + ' events';
  
  document.getElementById('loop-content').textContent = JSON.stringify(loops, null, 2);
  const openLoops = loops.filter(l => l.status === 'open').length;
  const doneLoops = loops.filter(l => l.status === 'done').length;
  document.getElementById('loop-badge').textContent = openLoops + ' open, ' + doneLoops + ' done';
  
  const state = {
    goal: 'Keep HexClamp progressing',
    active_loops: loops.filter(l => l.status === 'open').map(l => l.id),
    event_count: events.length
  };
  document.getElementById('state-content').textContent = JSON.stringify(state, null, 2);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runEnqueue() {
  const task = 'Task #' + taskId++ + ' - investigate ' + ['auth bug', 'PR #42', 'memory leak', 'UI regression'][Math.floor(Math.random()*4)];
  
  log('CLI: enqueue "' + task + '"', 'task');
  
  await sleep(200);
  setStage('observe', 'active');
  log('OBSERVE: Creating event from input', 'observe');
  
  const evt = {
    id: 'evt_' + Math.random().toString(36).substr(2, 6),
    source: 'cli',
    kind: 'chat_message',
    payload: { text: task }
  };
  events.push(evt);
  
  await sleep(400);
  setStage('observe', 'done');
  setStage('condense', 'active');
  log('CONDENSE: Adding event to queue', 'condense');
  
  const loop = {
    id: 'loop_' + Math.random().toString(36).substr(2, 6),
    description: task,
    status: 'open',
    created: Date.now()
  };
  loops.push(loop);
  
  await sleep(300);
  setStage('condense', 'done');
  log('Task queued. ' + loops.filter(l => l.status === 'open').length + ' open loops.', 'success');
  
  updateState();
}

async function runLoop() {
  if (events.length === 0 && loops.filter(l => l.status === 'open').length === 0) {
    log('Nothing to do. Enqueue a task first.', 'error');
    return;
  }
  
  log('--- Starting cycle ---', 'task');
  
  // Observe
  setStage('observe', 'active');
  log('OBSERVE: Loading events from queue', 'observe');
  await sleep(500);
  
  if (events.length > 0) {
    const evt = events.shift();
    log('Processing event: ' + evt.payload.text.substring(0, 40) + '...', 'observe');
  }
  setStage('observe', 'done');
  
  // Condense
  setStage('condense', 'active');
  log('CONDENSE: Building current state', 'condense');
  await sleep(500);
  
  const openLoops = loops.filter(l => l.status === 'open');
  log('Found ' + openLoops.length + ' open loops', 'condense');
  setStage('condense', 'done');
  
  // Plan
  setStage('plan', 'active');
  log('PLAN: Selecting next action', 'plan');
  await sleep(500);
  
  if (openLoops.length > 0) {
    const target = openLoops[0];
    log('Selected: ' + target.description.substring(0, 40) + '...', 'plan');
  }
  setStage('plan', 'done');
  
  // Execute
  setStage('execute', 'active');
  log('EXECUTE: Running action...', 'execute');
  await sleep(800);
  
  const openLoops2 = loops.filter(l => l.status === 'open');
  if (openLoops2.length > 0) openLoops2[0].status = 'done';
  log('EXECUTE: Done', 'execute');
  setStage('execute', 'done');
  
  // Verify
  setStage('verify', 'active');
  log('VERIFY: Checking result', 'verify');
  await sleep(400);
  log('VERIFY: Evidence confirmed', 'verify');
  setStage('verify', 'done');
  
  // Persist
  setStage('persist', 'active');
  log('PERSIST: Writing to disk', 'persist');
  await sleep(300);
  log('PERSIST: State saved', 'persist');
  setStage('persist', 'done');
  
  updateState();
  log('=== Cycle complete ===', 'success');
}

async function runFail() {
  log('--- Starting cycle with failure ---', 'task');
  
  setStage('observe', 'active');
  await sleep(400);
  setStage('observe', 'done');
  
  setStage('condense', 'active');
  await sleep(400);
  setStage('condense', 'done');
  
  setStage('plan', 'active');
  await sleep(400);
  setStage('plan', 'done');
  
  setStage('execute', 'active');
  log('EXECUTE: Running...', 'execute');
  await sleep(600);
  log('EXECUTE: ERROR - executor failed', 'error');
  setStage('execute', 'done');
  
  setStage('verify', 'active');
  log('VERIFY: No evidence - marking failed', 'verify');
  await sleep(300);
  setStage('verify', 'done');
  
  setStage('persist', 'active');
  log('PERSIST: Recording failure', 'persist');
  await sleep(300);
  setStage('persist', 'done');
  
  log('CIRCUIT BREAKER: 1/3 errors', 'error');
  log('=== Cycle failed ===', 'error');
}

function reset() {
  events = [];
  loops = [];
  logEntries = [];
  taskId = 1;
  document.getElementById('log-content').innerHTML = '';
  ['observe', 'condense', 'plan', 'execute', 'verify', 'persist'].forEach(s => {
    document.getElementById('s-' + s).className = 'stage ' + s;
  });
  updateState();
  log('System reset', 'task');
}
</script>
</body>
</html>
