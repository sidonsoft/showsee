<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showsee — Visual Presenter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  /* Toolbar */
  .toolbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  
  .toolbar-title {
    color: #58a6ff;
    font-size: 16px;
    font-weight: 600;
    margin-right: 10px;
  }
  
  .toolbar-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .toolbar-btn:hover { background: #30363d; }
  .toolbar-btn.primary { background: #1f3d1f; border-color: #3fb950; color: #3fb950; }
  .toolbar-btn.primary:hover { background: #2d5a2d; }
  .toolbar-btn.danger { color: #f85149; }
  .toolbar-btn.danger:hover { background: #3d1a1a; }
  
  .spacer { flex: 1; }
  
  .history-toggle {
    position: relative;
  }
  
  .history-panel {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 5px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    width: 320px;
    max-height: 500px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  
  .history-panel.open { display: block; }
  
  .history-header {
    padding: 12px 15px;
    border-bottom: 1px solid #30363d;
    font-size: 12px;
    color: #8b949e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .history-item {
    padding: 12px 15px;
    border-bottom: 1px solid #21262d;
    cursor: pointer;
    transition: background 0.2s;
  }
  
  .history-item:hover { background: #21262d; }
  .history-item:last-child { border-bottom: none; }
  
  .history-item-title {
    font-size: 13px;
    color: #e6edf3;
    margin-bottom: 4px;
  }
  
  .history-item-meta {
    font-size: 11px;
    color: #8b949e;
    display: flex;
    justify-content: space-between;
  }
  
  .history-item-delete {
    color: #f85149;
    font-size: 11px;
    padding: 2px 6px;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 3px;
  }
  
  .history-item-delete:hover { background: #3d1a1a; }
  
  .empty-history {
    padding: 30px;
    text-align: center;
    color: #8b949e;
    font-size: 13px;
  }
  
  /* Notification badge */
  .notif-badge {
    display: none;
    background: #f85149;
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: 5px;
    animation: pulse-badge 1s infinite;
  }
  
  .notif-badge.show { display: inline-block; }
  
  @keyframes pulse-badge {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  
  /* Content area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  
  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
  }
  
  .welcome h1 {
    color: #58a6ff;
    font-size: 48px;
    font-weight: 300;
    margin-bottom: 10px;
  }
  
  .welcome p {
    color: #8b949e;
    font-size: 16px;
    margin-bottom: 30px;
  }
  
  .welcome-views {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    max-width: 800px;
    width: 100%;
  }
  
  .view-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .view-card:hover {
    border-color: #58a6ff;
    transform: translateY(-2px);
  }
  
  .view-card h3 { color: #e6edf3; font-size: 14px; margin-bottom: 5px; }
  .view-card p { color: #8b949e; font-size: 12px; margin: 0; }
  .view-card .date { color: #484f58; font-size: 11px; margin-top: 8px; }
  
  /* Iframe container */
  .iframe-container {
    display: none;
    height: 100%;
  }
  
  .iframe-container.active { display: block; }
  
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: white;
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">Showsee</span>
  
  <button class="toolbar-btn primary" onclick="showCurrent()">
    👁 Current View
    <span class="notif-badge" id="notif-badge">NEW</span>
  </button>
  
  <div class="history-toggle">
    <button class="toolbar-btn" onclick="toggleHistory()">
      📋 History <span id="history-count"></span>
    </button>
    <div class="history-panel" id="history-panel"></div>
  </div>
  
  <div class="spacer"></div>
  
  <button class="toolbar-btn" onclick="refresh()">🔄 Refresh</button>
  <button class="toolbar-btn" onclick="openExternal()">↗ Open</button>
</div>

<div class="content">
  <div class="welcome" id="welcome-screen">
    <h1>Showsee</h1>
    <p>Select a view from history, or ask the agent to create a new one.</p>
    <div class="welcome-views" id="welcome-views"></div>
  </div>
  
  <div class="iframe-container" id="iframe-container">
    <iframe id="view-frame" src="about:blank"></iframe>
  </div>
</div>

<script>
// View management
const STORAGE_KEY = 'showsee_views';
const MAX_VIEWS = 50;

let currentView = null;
let views = [];

// Load views from localStorage
function loadViews() {
  try {
    views = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch {
    views = [];
  }
}

// Save views to localStorage
function saveViews() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(views.slice(0, MAX_VIEWS)));
}

// Add a new view
function addView(title, filename) {
  const view = {
    id: Date.now(),
    title: title,
    filename: filename,
    date: new Date().toISOString(),
    viewed: false
  };
  
  // Mark previous as viewed
  if (currentView) {
    currentView.viewed = true;
  }
  
  views.unshift(view);
  saveViews();
  
  // Show notification
  document.getElementById('notif-badge').classList.add('show');
  
  showView(view);
}

// Show a specific view
function showView(view) {
  currentView = view;
  view.viewed = true;
  saveViews();
  
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('iframe-container').classList.add('active');
  document.getElementById('view-frame').src = view.filename;
  document.getElementById('notif-badge').classList.remove('show');
  
  renderHistory();
}

// Show current/latest view
function showCurrent() {
  if (views.length > 0) {
    showView(views[0]);
  }
}

// Toggle history panel
function toggleHistory() {
  document.getElementById('history-panel').classList.toggle('open');
}

// Render history list
function renderHistory() {
  const panel = document.getElementById('history-panel');
  const count = document.getElementById('history-count');
  const welcome = document.getElementById('welcome-views');
  
  count.textContent = views.length > 0 ? `(${views.length})` : '';
  
  if (views.length === 0) {
    panel.innerHTML = '<div class="empty-history">No views yet.<br>Ask the agent to show you something.</div>';
    welcome.innerHTML = '<p style="color:#8b949e;grid-column:1/-1;">No history yet — ask the agent to show you something visual.</p>';
    return;
  }
  
  // History panel
  panel.innerHTML = `
    <div class="history-header">
      <span>View History</span>
      <button class="toolbar-btn danger" onclick="clearAll()" style="padding:3px 8px;font-size:10px;">Clear All</button>
    </div>
    ${views.map((v, i) => `
      <div class="history-item ${i === 0 ? 'current' : ''}" onclick="showView(views[${i}])">
        <div class="history-item-title">
          ${v.title}
          ${i === 0 ? '<span style="color:#3fb950;font-size:10px;margin-left:5px;">CURRENT</span>' : ''}
        </div>
        <div class="history-item-meta">
          <span>${formatDate(v.date)}</span>
          <button class="history-item-delete" onclick="event.stopPropagation();deleteView(${i})">Delete</button>
        </div>
      </div>
    `).join('')}
  `;
  
  // Welcome screen cards (last 6)
  welcome.innerHTML = views.slice(0, 6).map((v, i) => `
    <div class="view-card" onclick="showView(views[${i}])">
      <h3>${v.title}</h3>
      <p>${i === 0 ? 'Latest view' : 'Click to view'}</p>
      <div class="date">${formatDate(v.date)}</div>
    </div>
  `).join('');
}

// Format date
function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Delete a view
function deleteView(index) {
  const view = views[index];
  if (currentView && currentView.id === view.id) {
    // Deleting current view, go to next or welcome
    views.splice(index, 1);
    if (views.length > 0) {
      showView(views[0]);
    } else {
      showWelcome();
    }
  } else {
    views.splice(index, 1);
  }
  saveViews();
  renderHistory();
}

// Clear all views
function clearAll() {
  if (confirm('Delete all view history?')) {
    views = [];
    saveViews();
    showWelcome();
    renderHistory();
  }
}

// Show welcome screen
function showWelcome() {
  document.getElementById('welcome-screen').style.display = 'flex';
  document.getElementById('iframe-container').classList.remove('active');
  currentView = null;
}

// Refresh current view
function refresh() {
  if (currentView) {
    document.getElementById('view-frame').src = currentView.filename + '?t=' + Date.now();
  }
}

// Open in new tab
function openExternal() {
  if (currentView) {
    window.open(currentView.filename, '_blank');
  }
}

// Check for new views (called by server-side update)
function checkForUpdates() {
  // This would be called by the agent when a new view is saved
  // For now, just update the UI
  loadViews();
  renderHistory();
  
  // If there's a new view we don't have, show notification
  if (views.length > 0 && (!currentView || views[0].id !== currentView.id)) {
    document.getElementById('notif-badge').classList.add('show');
  }
}

// Close history when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.history-toggle')) {
    document.getElementById('history-panel').classList.remove('open');
  }
});

// Poll for updates every 2 seconds
setInterval(checkForUpdates, 2000);

// Init
loadViews();
renderHistory();
if (views.length > 0) {
  showView(views[0]);
}
</script>

</body>
</html>
