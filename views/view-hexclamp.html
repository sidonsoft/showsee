<!DOCTYPE html>
<html>
<head>
<title>HexClamp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: #0d1117; 
    color: #c9d1d9; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { 
    color: #58a6ff; 
    font-size: 22px;
    margin-bottom: 40px;
  }
  .flow {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .stage {
    background: #161b22;
    border: 2px solid;
    border-radius: 8px;
    padding: 14px 36px;
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    min-width: 140px;
  }
  .stage.o { border-color: #58a6ff; color: #58a6ff; }
  .stage.c { border-color: #79c0ff; color: #79c0ff; }
  .stage.p { border-color: #a5d6ff; color: #a5d6ff; }
  .stage.e { border-color: #f0883e; color: #f0883e; }
  .stage.v { border-color: #a371f7; color: #a371f7; }
  .stage.t { border-color: #3fb950; color: #3fb950; }
  
  .arrow { 
    color: #484f58; 
    font-size: 20px; 
    height: 30px;
    display: flex;
    align-items: center;
  }
  
  .loop-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  /* The feedback loop: VERIFY → PLAN */
  .feedback-loop {
    position: absolute;
    right: -80px;
    top: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 10px 0;
  }
  .loop-arrow {
    color: #a371f7;
    font-size: 18px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
  }
  .loop-label {
    color: #8b949e;
    font-size: 10px;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }
  
  .note {
    margin-top: 40px;
    padding: 16px 24px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    font-size: 13px;
    color: #8b949e;
    text-align: center;
    max-width: 400px;
  }
  .note strong { color: #c9d1d9; }
  .note .purple { color: #a371f7; }
  .note .blue { color: #a5d6ff; }
</style>
</head>
<body>
  <h1>HexClamp Autonomous Loop</h1>
  
  <div class="flow">
    <div class="stage o">OBSERVE</div>
    <div class="arrow">↓</div>
    <div class="stage c">CONDENSE</div>
    <div class="arrow">↓</div>
    
    <div class="loop-container">
      <div class="stage p">PLAN</div>
      
      <div class="feedback-loop">
        <div class="loop-arrow">↰</div>
        <div class="loop-label">if fail</div>
        <div class="loop-arrow">↰</div>
      </div>
      
      <div class="arrow">↓</div>
      <div class="stage e">EXECUTE</div>
      <div class="arrow">↓</div>
      <div class="stage v">VERIFY</div>
    </div>
    
    <div class="arrow">↓</div>
    <div class="stage t">PERSIST</div>
    <div class="arrow">↻</div>
    <div style="color: #3fb950; font-size: 12px;">loop</div>
  </div>

  <div class="note">
    <strong>Feedback loop:</strong> If <span class="purple">VERIFY</span> fails → back to <span class="blue">PLAN</span><br>
    <strong>Main loop:</strong> <span class="blue">PLAN</span> → <span class="purple">EXECUTE</span> → <span class="purple">VERIFY</span> → <span class="purple">PERSIST</span> → <span class="blue">OBSERVE</span>
  </div>
</body>
</html>
