<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Showsee</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: #0d1117; 
    color: #c9d1d9; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .toolbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo { color: #58a6ff; font-weight: bold; font-size: 15px; }
  .current { color: #8b949e; font-size: 13px; margin-right: auto; }
  .current span { color: #c9d1d9; }
  
  .tool-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .tool-btn:hover { background: #30363d; }
  .tool-btn.share { opacity: 0.4; cursor: default; } /* future */
  
  .history-dropdown { position: relative; }
  .history-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    min-width: 220px;
    max-height: 350px;
    overflow-y: auto;
    z-index: 100;
    margin-top: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .history-menu.show { display: block; }
  .history-item {
    padding: 12px 14px;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .history-item:hover { background: #21262d; }
  .history-item:last-child { border-bottom: none; }
  .history-item .title { flex: 1; font-size: 13px; color: #c9d1d9; }
  .history-item .date { font-size: 11px; color: #6e7681; }
  .history-item .delete {
    background: none;
    border: none;
    color: #f85149;
    cursor: pointer;
    padding: 4px 8px;
    font-size: 14px;
    border-radius: 4px;
  }
  .history-item .delete:hover { background: #f8514922; }
  .empty { padding: 20px; text-align: center; color: #8b949e; font-size: 12px; }
  
  .content { flex: 1; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; background: #0d1117; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="logo">Showsee:</span>
  <span class="current" id="current-view"><span>Loading...</span></span>
  
  <button class="tool-btn share" title="Share (coming soon)" style="margin-left:auto">Share</button>
  
  <div class="history-dropdown">
    <button class="tool-btn" onclick="toggleHistory()">History ▾</button>
    <div class="history-menu" id="history-menu">
      <div class="empty" id="empty-history">No history yet</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<div class="content">
  <iframe id="frame" src="/view-rust.html"></iframe>
</div>

<script>
const STORAGE_KEY = 'showsee_history';
const MAX_HISTORY = 30;

let currentViewId = 'view-rust';
let currentViewTitle = 'Rust';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } 
  catch { return []; }
}

function saveHistory(history) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function addToHistory(id, title) {
  const history = loadHistory();
  history.unshift({ id, title, time: Date.now() });
  const seen = new Set();
  const filtered = history.filter(h => {
    if (seen.has(h.id)) return false;
    seen.add(h.id);
    return true;
  }).slice(0, MAX_HISTORY);
  saveHistory(filtered);
  renderHistory();
}

function deleteHistory(index, event) {
  event.stopPropagation();
  const history = loadHistory();
  history.splice(index, 1);
  saveHistory(history);
  renderHistory();
}

function renderHistory() {
  const history = loadHistory();
  document.getElementById('empty-history').style.display = history.length ? 'none' : 'block';
  document.getElementById('history-list').innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="showView('${h.id}', '${h.title}')">
      <div class="title">${h.title}</div>
      <div class="date">${formatDate(h.time)}</div>
      <button class="delete" onclick="deleteHistory(${i}, event)">✕</button>
    </div>
  `).join('');
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  }
  return d.toLocaleDateString([], {month: 'short', day: 'numeric'});
}

function toggleHistory() {
  document.getElementById('history-menu').classList.toggle('show');
}

function showView(id, title) {
  document.getElementById('history-menu').classList.remove('show');
  document.getElementById('frame').src = '/' + id + '.html';
  document.getElementById('current-view').innerHTML = '<span>' + title + '</span>';
  currentViewId = id;
  currentViewTitle = title;
  addToHistory(id, title);
}

// Close history when clicking outside
document.addEventListener('click', (e) => {
  if (!e.closest('.history-dropdown')) {
    document.getElementById('history-menu').classList.remove('show');
  }
});

// Init
document.getElementById('current-view').innerHTML = '<span>' + currentViewTitle + '</span>';
addToHistory(currentViewId, currentViewTitle);
renderHistory();
</script>
</body>
</html>
