<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Showsee</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: #0d1117; 
    color: #c9d1d9; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .toolbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 8px 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .logo { color: #58a6ff; font-weight: bold; font-size: 14px; margin-right: 16px; }
  .nav-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
  }
  .nav-btn:hover { background: #30363d; }
  .nav-btn.active { background: #1f3d1f; border-color: #3fb950; color: #3fb950; }
  
  .history-dropdown { position: relative; }
  .history-menu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    min-width: 200px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 100;
    margin-top: 4px;
  }
  .history-menu.show { display: block; }
  .history-item {
    padding: 10px 12px;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .history-item:hover { background: #21262d; }
  .history-item:last-child { border-bottom: none; }
  .history-item .title { font-size: 13px; color: #c9d1d9; }
  .history-item .date { font-size: 11px; color: #8b949e; }
  .history-item .delete {
    background: none;
    border: none;
    color: #f85149;
    cursor: pointer;
    padding: 4px;
    font-size: 14px;
    opacity: 0.5;
  }
  .history-item .delete:hover { opacity: 1; }
  .empty-history { padding: 20px; text-align: center; color: #8b949e; font-size: 12px; }
  
  .content {
    flex: 1;
    overflow: auto;
    padding: 30px;
  }
  .welcome {
    text-align: center;
    padding-top: 80px;
  }
  .welcome h2 { color: #58a6ff; margin-bottom: 10px; }
  .welcome p { color: #8b949e; font-size: 14px; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="logo">Showsee</span>
  <button class="nav-btn active" onclick="showView('view-hexclamp')">HexClamp</button>
  <button class="nav-btn" onclick="showView('view-excalidraw-intro')">Excalidraw</button>
  
  <div class="history-dropdown">
    <button class="nav-btn" onclick="toggleHistory()">History ▾</button>
    <div class="history-menu" id="history-menu">
      <div class="empty-history" id="empty-history">No history yet</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<div class="content" id="content">
  <div class="welcome">
    <h2>Showsee</h2>
    <p>Click a view above, or ask the agent to create a new one.</p>
  </div>
</div>

<script>
const STORAGE_KEY = 'showsee_history';
const MAX_HISTORY = 20;

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveHistory(history) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function addToHistory(id, title) {
  const history = loadHistory();
  // Remove if exists
  history.unshift({ id, title, time: Date.now() });
  // Dedupe by id
  const seen = new Set();
  const filtered = history.filter(h => {
    if (seen.has(h.id)) return false;
    seen.add(h.id);
    return true;
  }).slice(0, MAX_HISTORY);
  saveHistory(filtered);
  renderHistory();
}

function deleteHistory(index, event) {
  event.stopPropagation();
  const history = loadHistory();
  history.splice(index, 1);
  saveHistory(history);
  renderHistory();
}

function renderHistory() {
  const history = loadHistory();
  const list = document.getElementById('history-list');
  const empty = document.getElementById('empty-history');
  
  if (history.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  
  empty.style.display = 'none';
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="showView('${h.id}')">
      <div>
        <div class="title">${h.title}</div>
        <div class="date">${new Date(h.time).toLocaleString()}</div>
      </div>
      <button class="delete" onclick="deleteHistory(${i}, event)">✕</button>
    </div>
  `).join('');
}

function toggleHistory() {
  document.getElementById('history-menu').classList.toggle('show');
}

function showView(id) {
  document.getElementById('history-menu').classList.remove('show');
  document.getElementById('content').innerHTML = '<iframe src="/' + id + '.html" style="width:100%;height:100%;border:none;background:#0d1117;"></iframe>';
  // Update nav buttons
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.nav-btn');
  // Find matching button
  btns.forEach(b => {
    if (b.textContent.includes(id.split('-')[1]?.charAt(0).toUpperCase() + id.split('-')[1]?.slice(1))) {
      b.classList.add('active');
    }
  });
  // Add to history
  const title = id.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  addToHistory(id, title);
}

// Close history when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.history-dropdown')) {
    document.getElementById('history-menu').classList.remove('show');
  }
});

// Init
renderHistory();
</script>
</body>
</html>
