<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Population</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: #0d1117; 
    color: #c9d1d9; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  .header {
    padding: 12px 16px;
    border-bottom: 1px solid #21262d;
    background: #161b22;
    flex-shrink: 0;
  }
  .header h1 {
    color: #58a6ff;
    font-size: 16px;
  }
  
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
    overflow: auto;
  }
  
  .controls {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  
  .control-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .control-group label {
    font-size: 13px;
    color: #8b949e;
  }
  
  .toggle {
    display: flex;
    background: #21262d;
    border-radius: 6px;
    overflow: hidden;
  }
  .toggle button {
    background: none;
    border: none;
    color: #8b949e;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
  }
  .toggle button.active {
    background: #58a6ff;
    color: #0d1117;
  }
  
  .year-display {
    font-size: 24px;
    font-weight: bold;
    color: #58a6ff;
  }
  
  .chart-container {
    flex: 1;
    background: #161b22;
    border-radius: 8px;
    padding: 20px;
    min-height: 300px;
  }
  
  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat {
    background: #161b22;
    border-radius: 6px;
    padding: 12px 16px;
    min-width: 150px;
  }
  .stat .label {
    color: #8b949e;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .stat .value {
    font-size: 20px;
    font-weight: bold;
    color: #c9d1d9;
  }
  .stat.highlight .value { color: #3fb950; }
  .stat.warning .value { color: #f0883e; }
</style>
</head>
<body>

<div class="header">
  <h1>World Population Growth</h1>
</div>

<div class="content">
  
  <div class="controls">
    <div class="control-group">
      <label>Year:</label>
      <div class="year-display" id="year-display">2024</div>
    </div>
    
    <div class="control-group">
      <label>View:</label>
      <div class="toggle">
        <button class="active" data-view="line">Line</button>
        <button data-view="bar">Bar</button>
      </div>
    </div>
  </div>
  
  <div class="chart-container">
    <canvas id="population-chart"></canvas>
  </div>
  
  <div class="stats">
    <div class="stat highlight">
      <div class="label">Current Population</div>
      <div class="value" id="stat-current">8.1B</div>
    </div>
    <div class="stat">
      <div class="label">2050 Projection</div>
      <div class="value">9.7B</div>
    </div>
    <div class="stat warning">
      <div class="label">Growth Rate</div>
      <div class="value">+1.05%/year</div>
    </div>
    <div class="stat">
      <div class="label">Year 2000</div>
      <div class="value">6.1B</div>
    </div>
  </div>
  
</div>

<script>
// World population data (billions)
const data = {
  labels: ['1950', '1960', '1970', '1980', '1990', '2000', '2010', '2020', '2024', '2030', '2040', '2050'],
  actual: [2.5, 3.0, 3.7, 4.4, 5.3, 6.1, 6.9, 7.8, 8.1, null, null, null],
  projected: [null, null, null, null, null, null, null, null, 8.1, 8.5, 9.1, 9.7]
};

let chart;

function createChart(type) {
  const ctx = document.getElementById('population-chart').getContext('2d');
  
  if (chart) chart.destroy();
  
  chart = new Chart(ctx, {
    type: type,
    data: {
      labels: data.labels,
      datasets: [
        {
          label: 'Actual',
          data: data.actual,
          borderColor: '#58a6ff',
          backgroundColor: type === 'bar' ? 'rgba(88, 166, 255, 0.3)' : 'rgba(88, 166, 255, 0.1)',
          fill: type === 'line',
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#58a6ff'
        },
        {
          label: 'Projected',
          data: data.projected,
          borderColor: '#f0883e',
          backgroundColor: 'rgba(240, 136, 62, 0.1)',
          borderDash: [5, 5],
          fill: type === 'line',
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#f0883e'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: '#c9d1d9' }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8b949e' },
          grid: { color: '#21262d' }
        },
        y: {
          ticks: { 
            color: '#8b949e',
            callback: value => value + 'B'
          },
          grid: { color: '#21262d' },
          min: 0,
          max: 12
        }
      }
    }
  });
}

document.querySelectorAll('.toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    createChart(btn.dataset.view);
  });
});

createChart('line');
</script>
</body>
</html>
